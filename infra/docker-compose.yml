name: bali-moto-track

services:
  postgres:
    image: postgis/postgis:16-3.4
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: bali_moto_track
    ports:
      - "5432:5432"
    volumes:
      - pg-data:/var/lib/postgresql/data
      - ./postgres/init-traccar-db.sql:/docker-entrypoint-initdb.d/init-traccar-db.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"

  traccar:
    image: traccar/traccar:5.12-ubuntu
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./traccar/traccar.xml:/opt/traccar/conf/traccar.xml:ro
      - traccar-data:/opt/traccar/data
      - traccar-logs:/opt/traccar/logs
    ports:
      - "8082:8082" # web/API + websocket (internal use only, do not expose publicly)
      - "5023:5023" # GT06/Concox
      - "5027:5027" # Teltonika
      - "5055:5055" # OsmAnd HTTP (usado por el simulador de Fase 0)

  api:
    build:
      context: ..
      dockerfile: infra/api.Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    environment:
      PORT: 3000
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/bali_moto_track
      REDIS_URL: redis://redis:6379
      TRACCAR_API_URL: http://traccar:8082
    ports:
      - "3000:3000"

  web:
    build:
      context: ..
      dockerfile: infra/web.Dockerfile
    restart: unless-stopped
    depends_on:
      - api
    ports:
      - "5173:5173"

volumes:
  pg-data:
  traccar-data:
  traccar-logs:
